apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-ml-model
  labels:
    app: ml-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-model
  template:
    metadata:
      labels:
        app: ml-model
    spec:
      containers:
      - name: model-server
        image: nginx:alpine
        ports:
        - containerPort: 80
